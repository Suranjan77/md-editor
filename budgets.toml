# Ratchet budgets: numbers may only go DOWN (toward the targets in
# docs/CODING_STANDARDS.md: soft 400 / hard 700 lines per module).
# Checked by scripts/check-budget.sh and scripts/unwrap-budget.sh in CI.
# When you shrink a file below its ceiling, lower the ceiling in the same PR.

[ratchets]
# unwrap()/expect( occurrences in production code (see scripts/unwrap-budget.sh)
unwrap_ceiling = 8
# Color::from_rgb* literals outside native/src/design (see scripts/check-budget.sh).
# Target is 0 once UXA.T2 design tokens land; ratchet down per migrated view.
raw_color_ceiling = 107

