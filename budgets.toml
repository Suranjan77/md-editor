# Ratchet budgets for Rust modules. Ceilings may only decrease — when a file
# shrinks below its ceiling, lower the number here so the growth cannot creep
# back. Enforced by scripts/size-budget.sh (run in CI).

[ratchets]
hard_limit = 700

[file_budgets]
"shell/src/gui/mod.rs" = 1441
"editor/src/buffer.rs" = 833
"shell/src/gui/tracker_view.rs" = 1204
"shell/src/gui/editor_canvas.rs" = 618
"kernel/src/pane.rs" = 725
"pdf/src/render.rs" = 704
