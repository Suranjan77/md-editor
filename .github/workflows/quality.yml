name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  architecture:
    name: Architecture and budgets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        run: |
          rustup update stable
          rustup default stable
          rustc --version
          cargo --version

      - name: Check architecture boundaries (ADR-0100)
        run: ./scripts/architecture-check.sh

      - name: Check module size budgets
        run: ./scripts/size-budget.sh

  rust:
    name: Format, lint, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libxkbcommon-dev libfontconfig1-dev libfreetype6-dev libwayland-dev

      - name: Install stable Rust
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests (includes BUG-A/B/C regression suites)
        run: cargo test --workspace

      - name: Run pdfium-wired tests (repo-local libpdfium)
        run: |
          cargo clippy -p md-pdf --all-targets --features pdfium -- -D warnings
          cargo test -p md-pdf --features pdfium
          cargo clippy -p md-shell --all-targets --features pdfium -- -D warnings
          cargo test -p md-shell --features pdfium

      - name: Kernel demo walks the regression scenarios
        run: cargo run -p md-shell -- --demo

      - name: Generated shortcuts doc is up to date
        run: |
          cargo run -q -p md-shell -- --dump-shortcuts > /tmp/shortcuts.md
          diff -u docs/SHORTCUTS.md /tmp/shortcuts.md
