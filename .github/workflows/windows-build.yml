name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APP_NAME: md-editor

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64 package
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        shell: pwsh
        run: |
          rustup update stable
          rustup default stable
          rustc --version
          cargo --version

      - name: Build release executable
        shell: pwsh
        run: |
          cargo build --release

      - name: Download Pdfium Windows x64
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "pdfium-download" | Out-Null

          Invoke-WebRequest `
            -Uri "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-win-x64.tgz" `
            -OutFile "pdfium-download/pdfium-win-x64.tgz"

          tar -xzf "pdfium-download/pdfium-win-x64.tgz" -C "pdfium-download"

          $pdfiumDll = Get-ChildItem -Path "pdfium-download" -Recurse -Filter "pdfium.dll" | Select-Object -First 1

          if (-not $pdfiumDll) {
            throw "pdfium.dll was not found in the downloaded Pdfium archive."
          }

          Write-Host "Found Pdfium DLL at: $($pdfiumDll.FullName)"

      - name: Create release package layout
        shell: pwsh
        run: |
          $packageDir = "release-package"
          $resourceDir = "$packageDir/resources"
          $exePath = "target/release/${{ env.APP_NAME }}.exe"

          if (-not (Test-Path $exePath)) {
            throw "Executable not found: $exePath. Check APP_NAME in the workflow."
          }

          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          New-Item -ItemType Directory -Force -Path $resourceDir | Out-Null

          Copy-Item $exePath "$packageDir/"
          
          $pdfiumDll = Get-ChildItem -Path "pdfium-download" -Recurse -Filter "pdfium.dll" | Select-Object -First 1
          Copy-Item $pdfiumDll.FullName "$resourceDir/pdfium.dll"

          Write-Host "Package layout:"
          Get-ChildItem -Path $packageDir -Recurse

      - name: Create zip archive
        shell: pwsh
        run: |
          $zipName = "${{ env.APP_NAME }}-windows-x64.zip"

          if (Test-Path $zipName) {
            Remove-Item $zipName
          }

          Compress-Archive `
            -Path "release-package/*" `
            -DestinationPath $zipName `
            -Force

          Write-Host "Created archive: $zipName"

      - name: Upload Windows zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-x64
          path: ${{ env.APP_NAME }}-windows-x64.zip

  build-linux:
    name: Build Linux x64 package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libxkbcommon-dev libfontconfig1-dev libfreetype6-dev libwayland-dev

      - name: Install stable Rust
        run: |
          rustup update stable
          rustup default stable
          rustc --version
          cargo --version

      - name: Build release executable
        run: |
          cargo build --release

      - name: Create release package layout
        run: |
          packageDir="release-package"
          resourceDir="$packageDir/resources"
          exePath="target/release/${{ env.APP_NAME }}"

          if [ ! -f "$exePath" ]; then
            echo "Executable not found: $exePath"
            exit 1
          fi

          mkdir -p "$packageDir"
          mkdir -p "$resourceDir"

          cp "$exePath" "$packageDir/"
          
          # Use the PDFium shared library downloaded during compilation
          # It is placed under target/release/libpdfium.so
          pdfiumPath="target/release/libpdfium.so"
          if [ -f "$pdfiumPath" ]; then
            cp "$pdfiumPath" "$resourceDir/libpdfium.so"
          else
            echo "libpdfium.so not found at $pdfiumPath"
            exit 1
          fi

          echo "Package layout:"
          ls -R "$packageDir"

      - name: Create archives
        run: |
          # Create tar.gz (retaining execution permissions)
          tar -czf "${{ env.APP_NAME }}-linux-x64.tar.gz" -C release-package .
          
          # Create zip as requested
          zip -r "${{ env.APP_NAME }}-linux-x64.zip" release-package

          echo "Created archives: ${{ env.APP_NAME }}-linux-x64.tar.gz and ${{ env.APP_NAME }}-linux-x64.zip"

      - name: Upload Linux archives
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-x64
          path: |
            ${{ env.APP_NAME }}-linux-x64.tar.gz
            ${{ env.APP_NAME }}-linux-x64.zip

  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-x64
          path: ./artifacts/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-x64
          path: ./artifacts/linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Build' }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: |
            ./artifacts/windows/${{ env.APP_NAME }}-windows-x64.zip
            ./artifacts/linux/${{ env.APP_NAME }}-linux-x64.tar.gz
            ./artifacts/linux/${{ env.APP_NAME }}-linux-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
