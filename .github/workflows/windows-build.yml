name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APP_NAME: md-editor

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64 package
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        shell: pwsh
        run: |
          rustup update stable
          rustup default stable
          rustc --version
          cargo --version

      - name: Build release executable
        shell: pwsh
        run: |
          cargo build --release

      - name: Create release package layout
        shell: pwsh
        run: |
          $packageDir = "release-package"
          $resourceDir = "$packageDir/resources"
          $exePath = "target/release/${{ env.APP_NAME }}.exe"
          $pdfiumPath = "target/release/pdfium.dll"

          if (-not (Test-Path $exePath)) {
            throw "Executable not found: $exePath. Check APP_NAME in the workflow."
          }
          if (-not (Test-Path $pdfiumPath)) {
            throw "PDFium library not found: $pdfiumPath"
          }

          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          New-Item -ItemType Directory -Force -Path $resourceDir | Out-Null

          Copy-Item $exePath "$packageDir/"
          Copy-Item $pdfiumPath "$resourceDir/pdfium.dll"
          Copy-Item "md-editor.png" "$packageDir/"
          Copy-Item "LICENSE" "$packageDir/"
          New-Item -ItemType File -Force -Path "$packageDir/portable.flag" | Out-Null

          Write-Host "Package layout:"
          Get-ChildItem -Path $packageDir -Recurse

      - name: Create zip archive
        shell: pwsh
        run: |
          $zipName = "${{ env.APP_NAME }}-windows-x64.zip"

          if (Test-Path $zipName) {
            Remove-Item $zipName
          }

          Compress-Archive `
            -Path "release-package/*" `
            -DestinationPath $zipName `
            -Force

          Write-Host "Created archive: $zipName"

      - name: Upload Windows zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-x64
          path: ${{ env.APP_NAME }}-windows-x64.zip

  build-linux:
    name: Build Linux x64 package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libxkbcommon-dev libfontconfig1-dev libfreetype6-dev libwayland-dev

      - name: Install stable Rust
        run: |
          rustup update stable
          rustup default stable
          rustc --version
          cargo --version

      - name: Build release executable
        run: |
          cargo build --release

      - name: Create release package layout
        run: |
          packageDir="release-package"
          resourceDir="$packageDir/resources"
          exePath="target/release/${{ env.APP_NAME }}"

          if [ ! -f "$exePath" ]; then
            echo "Executable not found: $exePath"
            exit 1
          fi

          mkdir -p "$packageDir"
          mkdir -p "$resourceDir"

          cp "$exePath" "$packageDir/"

          # Use the PDFium shared library downloaded during compilation
          # It is placed under target/release/libpdfium.so
          pdfiumPath="target/release/libpdfium.so"
          if [ -f "$pdfiumPath" ]; then
            cp "$pdfiumPath" "$resourceDir/libpdfium.so"
          else
            echo "libpdfium.so not found at $pdfiumPath"
            exit 1
          fi
          cp md-editor.png "$packageDir/"
          cp LICENSE "$packageDir/"
          touch "$packageDir/portable.flag"

          echo "Package layout:"
          ls -R "$packageDir"

      - name: Create archives
        run: |
          # Create tar.gz (retaining execution permissions)
          tar -czf "${{ env.APP_NAME }}-linux-x64.tar.gz" -C release-package .
          
          # Create zip as requested
          zip -r "${{ env.APP_NAME }}-linux-x64.zip" release-package

          echo "Created archives: ${{ env.APP_NAME }}-linux-x64.tar.gz and ${{ env.APP_NAME }}-linux-x64.zip"

      - name: Upload Linux archives
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-x64
          path: |
            ${{ env.APP_NAME }}-linux-x64.tar.gz
            ${{ env.APP_NAME }}-linux-x64.zip

  build-macos:
    name: Build macOS ${{ matrix.arch }} package
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            arch: x64
          - runner: macos-15
            arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        run: |
          rustup update stable
          rustup default stable
          rustc --version
          cargo --version

      - name: Build release executable
        run: cargo build --release

      - name: Create release package
        run: |
          package_dir="release-package"
          app_bundle="$package_dir/MD Editor.app"
          contents_dir="$app_bundle/Contents"
          macos_dir="$contents_dir/MacOS"
          resource_dir="$contents_dir/Resources"
          exe_path="target/release/${{ env.APP_NAME }}"
          pdfium_path="target/release/libpdfium.dylib"
          archive="${{ env.APP_NAME }}-macos-${{ matrix.arch }}.tar.gz"

          test -x "$exe_path"
          test -f "$pdfium_path"
          mkdir -p "$macos_dir" "$resource_dir" "md-editor.iconset"
          cp "$exe_path" "$macos_dir/"
          cp "$pdfium_path" "$resource_dir/"
          cp LICENSE "$package_dir/"
          touch "$package_dir/portable.flag"

          sips -z 16 16 md-editor.png --out md-editor.iconset/icon_16x16.png
          sips -z 32 32 md-editor.png --out md-editor.iconset/icon_16x16@2x.png
          sips -z 32 32 md-editor.png --out md-editor.iconset/icon_32x32.png
          sips -z 64 64 md-editor.png --out md-editor.iconset/icon_32x32@2x.png
          sips -z 128 128 md-editor.png --out md-editor.iconset/icon_128x128.png
          sips -z 256 256 md-editor.png --out md-editor.iconset/icon_128x128@2x.png
          sips -z 256 256 md-editor.png --out md-editor.iconset/icon_256x256.png
          sips -z 512 512 md-editor.png --out md-editor.iconset/icon_256x256@2x.png
          sips -z 512 512 md-editor.png --out md-editor.iconset/icon_512x512.png
          cp md-editor.png md-editor.iconset/icon_512x512@2x.png
          iconutil -c icns md-editor.iconset -o "$resource_dir/md-editor.icns"

          cat > "$contents_dir/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDisplayName</key>
            <string>MD Editor</string>
            <key>CFBundleExecutable</key>
            <string>md-editor</string>
            <key>CFBundleIconFile</key>
            <string>md-editor</string>
            <key>CFBundleIdentifier</key>
            <string>com.suranjan77.md-editor</string>
            <key>CFBundleName</key>
            <string>MD Editor</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          plutil -lint "$contents_dir/Info.plist"
          codesign --force --deep --sign - "$app_bundle"
          tar -czf "$archive" -C "$package_dir" .

      - name: Upload macOS archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-${{ matrix.arch }}
          path: ${{ env.APP_NAME }}-macos-${{ matrix.arch }}.tar.gz

  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-x64
          path: ./artifacts/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-x64
          path: ./artifacts/linux

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-x64
          path: ./artifacts/macos-x64

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-arm64
          path: ./artifacts/macos-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Build' }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: |
            ./artifacts/windows/${{ env.APP_NAME }}-windows-x64.zip
            ./artifacts/linux/${{ env.APP_NAME }}-linux-x64.tar.gz
            ./artifacts/linux/${{ env.APP_NAME }}-linux-x64.zip
            ./artifacts/macos-x64/${{ env.APP_NAME }}-macos-x64.tar.gz
            ./artifacts/macos-arm64/${{ env.APP_NAME }}-macos-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
